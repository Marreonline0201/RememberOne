# Codemagic CI — builds the iOS app (signed .ipa) in the cloud and uploads it to
# TestFlight, so it can be built from Windows without a Mac.
#
# This is a Capacitor 8 SPM project (ios/App/CapApp-SPM, no Podfile), so we build
# ios/App/App.xcodeproj directly (scheme "App") — no `pod install`. The app loads
# its UI from the remote https://rememberone.online (server.url), so the local web
# bundle (webDir = public/, already in the repo) is just a fallback that `cap sync`
# copies in — no Next build step is needed for the iOS shell.
#
# FIRST-RUN SETUP (do these once, see the chat for button-level steps):
#   1. App Store Connect -> Users and Access -> Integrations -> App Store Connect
#      API -> generate a key (role: App Manager). Download the .p8, note Issuer ID
#      + Key ID.
#   2. Codemagic -> Teams/personal settings -> Integrations -> Developer Portal ->
#      add that key. NAME IT "codemagic" so the `integrations:` ref below matches.
#   3. Fill APP_STORE_APPLE_ID below with the numeric Apple ID of the RememberOne
#      app record (App Store Connect -> your app -> App Information -> "Apple ID").
#   4. Make sure the App ID com.rememberone.app has the "Sign In with Apple"
#      capability enabled (already done) so the auto provisioning profile includes it.
#
# Expect to iterate on the first build (signing / scheme specifics are environment-
# dependent). The Codemagic build log will pinpoint anything to adjust.

workflows:
  ios-testflight:
    name: RememberOne iOS — TestFlight
    instance_type: mac_mini_m2          # free tier: 500 macOS M2 min/month
    max_build_duration: 60

    integrations:
      app_store_connect: codemagic       # <-- the API key name you saved in Codemagic

    environment:
      vars:
        BUNDLE_ID: "com.rememberone.app"
        APPLE_TEAM_ID: "LFJHU84S5S"       # Apple Developer Team ID (for manual archive signing)
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        APP_STORE_APPLE_ID: 6784896315   # RememberOne's App Store Connect Apple ID
      node: 22          # Capacitor 8 CLI requires Node >= 22
      xcode: latest

    scripts:
      - name: Install JS dependencies
        script: npm ci

      - name: Capacitor sync iOS (regenerates config + copies webDir)
        script: npx cap sync ios

      - name: Set up code signing (create cert + profile from scratch)
        script: |
          keychain initialize
          # A brand-new account has NO distribution certificate. fetch-signing-files
          # --create needs a private key to create the certificate FROM — without it
          # no usable cert is produced and use-profiles has nothing to apply (the
          # "App requires a provisioning profile" archive error). So generate a key;
          # fetch-signing-files then creates the distribution cert AND the App Store
          # provisioning profile. API creds come from the App Store Connect API key
          # integration's APP_STORE_CONNECT_* env vars.
          ssh-keygen -t rsa -b 2048 -m PEM -f /tmp/sign_key -q -N ""
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --platform IOS \
            --certificate-key @file:/tmp/sign_key \
            --create
          keychain add-certificates
          xcode-project use-profiles

      - name: Set build number from latest TestFlight build
        script: |
          BUILD_NUMBER=$(app-store-connect get-latest-app-store-build-number "$APP_STORE_APPLE_ID" 2>/dev/null || echo 0)
          cd ios/App
          agvtool new-version -all $(($BUILD_NUMBER + 1))

      - name: Build signed IPA
        script: |
          # Pass the team explicitly so the archive's manual signing can resolve
          # the provisioning profile (the Capacitor project ships with an empty
          # DEVELOPMENT_TEAM, which causes "App requires a provisioning profile").
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME" \
            --archive-xcargs "CODE_SIGN_STYLE=Manual DEVELOPMENT_TEAM=$APPLE_TEAM_ID"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      app_store_connect:
        auth: integration                # use the stored App Store Connect API key
        # The build UPLOADS to App Store Connect and is immediately available for
        # INTERNAL TestFlight testing (no review). We deliberately do NOT set
        # submit_to_testflight: that submits for EXTERNAL beta review, which fails
        # until "Beta App Review Information" + a Feedback Email are filled in.
        # Add `submit_to_testflight: true` back only when you want external testers.
      email:
        recipients:
          - ddogroundonline@gmail.com
        notify:
          success: true
          failure: true

  # ---------------------------------------------------------------------------
  # Simulator build for Appetize.io — run the app in a browser, no device and no
  # code signing required. Run this workflow, download the RememberOne-sim.app.zip
  # artifact, then upload it at https://appetize.io/upload. Good for UI + Google/
  # Apple login flows; the browser simulator has no microphone, so the voice
  # feature can't be exercised here.
  # ---------------------------------------------------------------------------
  ios-simulator:
    name: RememberOne iOS — Simulator (Appetize)
    instance_type: mac_mini_m2
    max_build_duration: 60

    environment:
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
      node: 22
      xcode: latest

    scripts:
      - name: Install JS dependencies
        script: npm ci

      - name: Capacitor sync iOS (copies webDir + config)
        script: npx cap sync ios

      - name: Build unsigned app for the iOS Simulator
        script: |
          # Simulator builds need no signing/cert. Output lands under
          # build/Build/Products/Debug-iphonesimulator/App.app
          xcodebuild build \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO

      - name: Zip the .app for Appetize
        script: |
          cd build/Build/Products/Debug-iphonesimulator
          zip -r "$CM_BUILD_DIR/RememberOne-sim.app.zip" App.app

    artifacts:
      - RememberOne-sim.app.zip
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - ddogroundonline@gmail.com
        notify:
          success: true
          failure: true
